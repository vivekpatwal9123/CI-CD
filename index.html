<!DOCTYPE html>
<html>
<head>
    <title>One Piece</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:url('https://images.alphacoders.com/606/606263.jpg')
            no-repeat center center/cover;

            font-family:Arial, sans-serif;
        }

        .overlay{
            position:absolute;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.5);
        }

        h1{
            position:relative;
            color:white;
            font-size:120px;
            letter-spacing:10px;

            text-shadow:
            0 0 10px #ff0000,
            0 0 20px #ff0000,
            0 0 40px #ff0000;

            background:rgba(0,0,0,0.4);
            padding:20px 60px;
            border-radius:20px;
        }

    </style>

</head>

<body>

    <div class="overlay"></div>

    <h1>ONE PIECE</h1>

</body>
</html>
